let current = 0;
const total = 6;
const viewer = document.getElementById('viewer');
function show(n) {
    current = Math.max(0, Math.min(total - 1, n));
    viewer.srcdoc = slides[current];
    document.getElementById('counter').textContent = (current + 1) + ' / ' + total;
    document.getElementById('progress').style.width = ((current + 1) / total * 100) + '%';
    const pn = document.getElementById('pageNum');
    pn.textContent = (current + 1) + ' / ' + total;
    pn.style.color = darkSlides.has(current) ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.25)';
}
function go(dir) { show(current + dir); }
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
    if (e.key === 'Home') show(0);
    if (e.key === 'End') show(total - 1);
});
document.getElementById('navLeft').addEventListener('click', () => go(-1));
document.getElementById('navRight').addEventListener('click', () => go(1));
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 50) dx > 0 ? go(-1) : go(1);
});
show(0);
</script>
</body>
</html>
