&lt;script&gt;
// Draggable SVG labels
const svg = document.querySelector(&#x27;.pizza-svg&#x27;);
let dragging = null, offset = {x:0, y:0};

function pt(e) {
    const p = svg.createSVGPoint();
    p.x = e.clientX; p.y = e.clientY;
    return p.matrixTransform(svg.getScreenCTM().inverse());
}

document.querySelectorAll(&#x27;.draggable-label&#x27;).forEach(el =&gt; {
    el.style.cursor = &#x27;move&#x27;;
    el.addEventListener(&#x27;mousedown&#x27;, e =&gt; {
        dragging = el;
        const p = pt(e);
        offset.x = p.x - parseFloat(el.getAttribute(&#x27;x&#x27;));
        offset.y = p.y - parseFloat(el.getAttribute(&#x27;y&#x27;));
        e.preventDefault();
    });
});

svg.addEventListener(&#x27;mousemove&#x27;, e =&gt; {
    if (!dragging) return;
    const p = pt(e);
    const nx = p.x - offset.x;
    const ny = p.y - offset.y;
    dragging.setAttribute(&#x27;x&#x27;, nx);
    dragging.setAttribute(&#x27;y&#x27;, ny);
    dragging.querySelectorAll(&#x27;tspan&#x27;).forEach(t =&gt; t.setAttribute(&#x27;x&#x27;, nx));
});

svg.addEventListener(&#x27;mouseup&#x27;, () =&gt; { 
    dragging = null;
    updatePositions();
});

&lt;/script&gt;

});

const annG = document.getElementById(&#x27;annotations&#x27;);
let counter = 0;

// Initial annotations data
const initialLabels = [

    { texts: [&quot;Dominos ordering voice assistant&quot;,&quot;\&quot;Piece of Pie\&quot; loyalty programme&quot;], rx: 317, ry: 209, w: 210, h: 19, ax1: 422, ay1: 249, ax2: 445, ay2: 360 },

    { texts: [&quot;Peak quarantine orders&quot;], rx: 491, ry: 72, w: 160, h: 19, ax1: 590, ay1: 91, ax2: 643, ay2: 180 },
    { texts: [&quot;CEO Allison retires&quot;,&quot;Driver shortage, food inflation&quot;], rx: 698, ry: 19, w: 165, h: 19, ax1: 780, ay1: 59, ax2: 703, ay2: 129 },
    { texts: [&quot;Uber Eats deal&quot;], rx: 651, ry: 288, w: 105, h: 19, ax1: 715, ay1: 288, ax2: 739, ay2: 222 },
    { texts: [&quot;DoorDash partnership&quot;], rx: 743, ry: 251, w: 135, h: 19, ax1: 800, ay1: 251, ax2: 834, ay2: 139 },
];

function createAnnotation(data) {
    const id = counter++;
    const g = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;g&quot;);
    g.setAttribute(&quot;data-id&quot;, id);

    // Arrow line
    const line = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;line&quot;);
    line.setAttribute(&quot;x1&quot;, data.ax1); line.setAttribute(&quot;y1&quot;, data.ay1);
    line.setAttribute(&quot;x2&quot;, data.ax2); line.setAttribute(&quot;y2&quot;, data.ay2);
    line.setAttribute(&quot;stroke&quot;, &quot;#831011&quot;); line.setAttribute(&quot;stroke-width&quot;, &quot;1&quot;); line.setAttribute(&quot;opacity&quot;, &quot;0.5&quot;);
    line.classList.add(&quot;conn&quot;);
    g.appendChild(line);

    // Arrow end dot (red, draggable)
    const dotEnd = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;circle&quot;);
    dotEnd.setAttribute(&quot;cx&quot;, data.ax2); dotEnd.setAttribute(&quot;cy&quot;, data.ay2);
    dotEnd.setAttribute(&quot;r&quot;, &quot;4&quot;); dotEnd.classList.add(&quot;arrow-end&quot;);
    g.appendChild(dotEnd);

    // Arrow start dot (blue, draggable)
    const dotStart = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;circle&quot;);
    dotStart.setAttribute(&quot;cx&quot;, data.ax1); dotStart.setAttribute(&quot;cy&quot;, data.ay1);
    dotStart.setAttribute(&quot;r&quot;, &quot;4&quot;); dotStart.classList.add(&quot;arrow-start&quot;);
    g.appendChild(dotStart);

    // Label boxes + text
    const labelG = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;g&quot;);
    labelG.classList.add(&quot;label-group&quot;);

    if (data.multiline) {
        // Single box with two lines of text
        const rect = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;rect&quot;);
        rect.setAttribute(&quot;x&quot;, data.rx); rect.setAttribute(&quot;y&quot;, data.ry);
        rect.setAttribute(&quot;width&quot;, data.w); rect.setAttribute(&quot;height&quot;, data.h);
        rect.setAttribute(&quot;rx&quot;, &quot;2&quot;); rect.setAttribute(&quot;fill&quot;, &quot;rgba(255,255,255,0.9)&quot;);
        rect.setAttribute(&quot;stroke&quot;, &quot;#E4DFC8&quot;); rect.setAttribute(&quot;stroke-width&quot;, &quot;0.6&quot;);
        labelG.appendChild(rect);
        // Use the two text entries directly
        const line1 = data.texts[0];
        const line2 = data.texts.length &gt; 1 ? data.texts[1] : &quot;&quot;;
        const t1 = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;text&quot;);
        t1.setAttribute(&quot;x&quot;, data.rx + data.w / 2); t1.setAttribute(&quot;y&quot;, data.ry + 12);
        t1.setAttribute(&quot;text-anchor&quot;, &quot;middle&quot;); t1.setAttribute(&quot;font-size&quot;, &quot;9&quot;);
        t1.setAttribute(&quot;font-weight&quot;, &quot;600&quot;); t1.setAttribute(&quot;fill&quot;, &quot;#4C4F56&quot;);
        t1.textContent = line1;
        labelG.appendChild(t1);
        if (line2) {
            const t2 = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;text&quot;);
            t2.setAttribute(&quot;x&quot;, data.rx + data.w / 2); t2.setAttribute(&quot;y&quot;, data.ry + 24);
            t2.setAttribute(&quot;text-anchor&quot;, &quot;middle&quot;); t2.setAttribute(&quot;font-size&quot;, &quot;9&quot;);
            t2.setAttribute(&quot;font-weight&quot;, &quot;600&quot;); t2.setAttribute(&quot;fill&quot;, &quot;#4C4F56&quot;);
            t2.textContent = line2;
            labelG.appendChild(t2);
        }
    } else {
        data.texts.forEach((t, i) =&gt; {
            const h = data.h || 19;
            const gap = 2;
            const rect = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;rect&quot;);
            rect.setAttribute(&quot;x&quot;, data.rx); rect.setAttribute(&quot;y&quot;, data.ry + i * (h + gap));
            rect.setAttribute(&quot;width&quot;, data.w); rect.setAttribute(&quot;height&quot;, h);
            rect.setAttribute(&quot;rx&quot;, &quot;2&quot;); rect.setAttribute(&quot;fill&quot;, &quot;rgba(255,255,255,0.9)&quot;);
            rect.setAttribute(&quot;stroke&quot;, &quot;#E4DFC8&quot;); rect.setAttribute(&quot;stroke-width&quot;, &quot;0.6&quot;);
            labelG.appendChild(rect);
            const text = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;text&quot;);
            text.setAttribute(&quot;x&quot;, data.rx + data.w / 2);
            text.setAttribute(&quot;y&quot;, data.ry + i * (h + gap) + 13);
            text.setAttribute(&quot;text-anchor&quot;, &quot;middle&quot;); text.setAttribute(&quot;font-size&quot;, &quot;9&quot;);
            text.setAttribute(&quot;font-weight&quot;, &quot;600&quot;); text.setAttribute(&quot;fill&quot;, &quot;#4C4F56&quot;);
            text.textContent = t;
            labelG.appendChild(text);
        });
    }
    g.appendChild(labelG);

    annG.appendChild(g);
    return g;
}

// Initialize all annotations
initialLabels.forEach(d =&gt; createAnnotation(d));

// Drag logic
let dragging = null, dragType = null, dragOffset = { x: 0, y: 0 };

function pt(e) {
    const p = svg.createSVGPoint(); p.x = e.clientX; p.y = e.clientY;
    return p.matrixTransform(svg.getScreenCTM().inverse());
}

svg.addEventListener(&quot;mousedown&quot;, e =&gt; {
    const t = e.target;
    if (t.classList.contains(&quot;arrow-end&quot;)) {
        dragging = t.closest(&quot;g[data-id]&quot;); dragType = &quot;arrow-end&quot;; e.preventDefault();
    } else if (t.classList.contains(&quot;arrow-start&quot;)) {
        dragging = t.closest(&quot;g[data-id]&quot;); dragType = &quot;arrow-start&quot;; e.preventDefault();
    } else {
        const lg = t.closest(&quot;.label-group&quot;);
        if (lg) {
            dragging = lg.closest(&quot;g[data-id]&quot;); dragType = &quot;label&quot;;

document.addEventListener(&#x27;keydown&#x27;, function(e) {
    if (e.key === &#x27;ArrowRight&#x27; || e.key === &#x27;ArrowDown&#x27; || e.key === &#x27; &#x27;) {
        e.preventDefault();
        window.parent.postMessage(&#x27;next&#x27;, &#x27;*&#x27;);
    } else if (e.key === &#x27;ArrowLeft&#x27; || e.key === &#x27;ArrowUp&#x27;) {
        e.preventDefault();
        window.parent.postMessage(&#x27;prev&#x27;, &#x27;*&#x27;);
    }
});
document.addEventListener(&#x27;click&#x27;, function(e) {
    if (e.target.closest &amp;&amp; (e.target.closest(&#x27;#chart&#x27;) || e.target.closest(&#x27;.label-group&#x27;) || e.target.closest(&#x27;.arrow-end&#x27;) || e.target.closest(&#x27;.arrow-start&#x27;))) return;
    if (e.target.tagName === &#x27;BUTTON&#x27; || e.target.tagName === &#x27;TEXTAREA&#x27;) return;
    var x = e.clientX / window.innerWidth;
    if (x &lt; 0.33) window.parent.postMessage(&#x27;prev&#x27;, &#x27;*&#x27;);
    else window.parent.postMessage(&#x27;next&#x27;, &#x27;*&#x27;);
});
window.addEventListener(&#x27;message&#x27;, function(e) {
    if (e.data === &#x27;activate&#x27;) {
        document.querySelectorAll(&#x27;svg&#x27;).forEach(function(svg) {
            svg.pauseAnimations &amp;&amp; svg.pauseAnimations();
            svg.setCurrentTime &amp;&amp; svg.setCurrentTime(0);

        });
        document.querySelectorAll(&#x27;.reveal&#x27;).forEach(function(r) {

            r.offsetHeight;
            r.style.animation = &#x27;&#x27;;
        });
        document.querySelectorAll(&#x27;.fill-animate&#x27;).forEach(function(r) {

        });
    }
});

<script>
let cur=1,tot=14;
function go(n){
    if(n<1||n>tot)return;
    document.getElementById('slide-'+cur).style.display='none';
    cur=n;
    const frame=document.getElementById('slide-'+cur);
    frame.style.display='block';
    frame.contentWindow.postMessage('activate','*');
}
window.addEventListener('message',function(e){
    if(e.data==='next')go(cur+1);
    else if(e.data==='prev')go(cur-1);
});
document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();go(cur+1);}
    else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();go(cur-1);}
});
</script>
